services:
  phpccdae:
    container_name: php-ccdae
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www/html
      - ./../storage:/var/www/html/storage
      - ./../storage/app/public:/var/www/html/public/storage
      - ./docker/php.ini:/usr/local/etc/php/conf.d/docker-php.ini
    depends_on:
      - postgres
    networks:
      - default
    restart: always

  nginx:
    ports:
      - 8787:80
    container_name: nginx-ccdae
    image: nginx
    hostname: ccdae.container
    volumes:
      - ./:/var/www/html
      - ./../storage:/var/www/html/storage
      - ./../storage/app/public:/var/www/html/public/storage
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - phpccdae
    networks:
      - default
    restart: always

  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: postgres-ccdae
    ports:
      - "5532:5432"
    environment:
      POSTGRES_DB: data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
    restart: always

networks:
  default:
    name: rede_local
    external: true

volumes:
  postgres_data:
